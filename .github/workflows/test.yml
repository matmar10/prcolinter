---

name: Action self-test

on:
  pull_request:
    branches: [ '*' ]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  test-action:
    name: Enforce convention commit
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v2
      - name: Test the action locally
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
